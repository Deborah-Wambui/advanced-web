<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book & Support - Campus Life</title>
    <meta name="description" content="Book rooms and get help desk support">
    <link rel="stylesheet" href="../css/tokens.css">
    <link rel="stylesheet" href="../css/base.css">
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <header role="banner">
        <nav role="navigation" aria-label="Main navigation">
            <div class="nav-container">
                <h1><a href="../index.html" class="logo">CampusLife</a></h1>
                <ul class="nav-menu">
                    <li><a href="../index.html">Home</a></li>
                    <li><a href="data.html">Events & Clubs</a></li>
                    <li><a href="form.html" aria-current="page">Book & Support</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main id="main-content" role="main">
        <section id="bookings" aria-labelledby="bookings-heading">
            <div class="container">
                <h1 id="bookings-heading">Room Bookings</h1>
                <form class="booking-form">
                    <div class="form-group">
                        <label for="room">Select Room</label>
                        <select id="room" name="room">
                            <option value="">Choose a room...</option>
                            <option value="study-a">Study Room A</option>
                            <option value="study-b">Study Room B</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="date">Date</label>
                        <input type="date" id="date" name="date">
                    </div>
                    
                    <button type="submit">Book Room</button>
                </form>
            </div>
        </section>

        <section id="helpdesk" aria-labelledby="helpdesk-heading">
            <div class="container">
                <h2 id="helpdesk-heading">Help Desk</h2>
                <form class="ticket-form">
                    <div class="form-group">
                        <label for="issue">Describe your issue</label>
                        <textarea id="issue" name="issue"></textarea>
                    </div>
                    <button type="submit">Submit Ticket</button>
                </form>
            </div>
        </section>
    </main>

    <footer role="contentinfo">
        <div class="container">
            <p>&copy; 2025 Campus Life Portal</p>
        </div>
    </footer>

    <script src="../js/a11y.js"></script>
</body>
</html>
